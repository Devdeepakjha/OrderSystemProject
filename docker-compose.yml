version: "3.9"

services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ordersystem_backend
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - MONGO_URI=mongodb://mongo:27017/ordersystem
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
    restart: always

  mongo:
    image: mongo:7
    container_name: ordersystem_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7
    container_name: ordersystem_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo_data:
